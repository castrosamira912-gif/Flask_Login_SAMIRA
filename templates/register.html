{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg border-0">

            <div class="card-header bg-success text-white text-center">

                
<h3>🌸 Crear Cuenta</h3>

<p class="mb-0">
    Bienvenida al Sistema de Autenticación
</p>

            </div>

            <div class="card-body p-4">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Nombre de Usuario
                        </label>

                        <input
                            type="text"
                            class="form-control"
                            name="username"
                            placeholder="Ingrese su usuario"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Contraseña
                        </label>

                        <input
                            type="password"
                            class="form-control"
                            name="password"
                            placeholder="Ingrese una contraseña"
                            required>

                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-success">

                            Registrarse

                        </button>

                    </div>

                </form>

                <hr>

                <div class="text-center">

                    ¿Ya tienes una cuenta?

                    <br><br>

                    <a href="{{ url_for('login') }}"
                       class="btn btn-outline-primary">

                        Iniciar Sesión

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
