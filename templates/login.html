{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <div class="card shadow">

            <div class="card-header text-center">

                <h3>💜 Iniciar Sesión</h3>

                <p class="mb-0">
                    Ingresa con tus credenciales
                </p>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label>Usuario</label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Contraseña</label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>

                    </div>

                    <button class="btn btn-primary w-100">

                        Ingresar

                    </button>

                </form>

                <hr>

                <div class="text-center">

                    ¿No tienes una cuenta?

                    <br><br>

                    <a href="{{ url_for('register') }}"
                       class="btn btn-outline-success">

                        Crear Usuario

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
